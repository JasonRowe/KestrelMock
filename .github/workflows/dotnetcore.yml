name: Unit Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Validate Version Bump
      if: github.event_name == 'pull_request'
      run: |
        VERSION=$(grep -oPm1 "(?<=<PackageVersion>)[^<]+" KestrelMock/KestrelMockServer.csproj)
        echo "Checking if version $VERSION is already published on NuGet..."
        
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.nuget.org/v3-flatcontainer/kestrelmock/$VERSION/kestrelmock.nuspec")
        
        if [ "$HTTP_STATUS" == "200" ]; then
          echo "::error::Version $VERSION is already published to NuGet! Please bump the <PackageVersion> in KestrelMock/KestrelMockServer.csproj before merging."
          exit 1
        elif [ "$HTTP_STATUS" == "404" ]; then
          echo "Version $VERSION is new. Good to go!"
        else
          echo "Unexpected response from NuGet API: $HTTP_STATUS. Assuming new version."
        fi

    - name: Setup .NET 10.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run:  dotnet test --no-restore -p:CollectCoverage=true -p:CoverletOutput=TestResults/ -p:CoverletOutputFormat=opencover --no-build --verbosity normal
    - name: Create Test Coverage Badge
      uses: simon-k/dotnet-code-coverage-badge@v1.0.0
      id: create_coverage_badge
      with:
        label: Unit Test Coverage
        color: brightgreen
        path: KestrelMock.Tests/TestResults/coverage.opencover.xml
        gist-filename: code-coverage.json
        gist-id: fe23c15603763c6eb09eea7bd38ba23f
        gist-auth-token: ${{ secrets.GIST_AUTH_TOKEN }}       
    - name: Print code coverage
      run: echo "Code coverage percentage ${{steps.create_coverage_badge.outputs.percentage}}%"